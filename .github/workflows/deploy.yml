name: Deploy a Vercel Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Vercel project
        run: npx vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Vercel builds in cloud)
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
